<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warehouse Command Center</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}

h1 {
  text-align: center;
  background: #0078D4;
  padding: 10px;
}

.container {
  display: flex;
  flex-wrap: wrap;
}

.door {
  width: 24%;
  margin: 5px;
  background: #222;
  padding: 10px;
}

.door h2 {
  background: #444;
  text-align: center;
}

.load {
  padding: 8px;
  margin: 5px 0;
}

.late { background:red; }
.upcoming { background:orange; }
.complete { background:green; }

input {
  width: 100%;
  border: none;
  background: transparent;
  color: white;
}
</style>
</head>

<body>

<h1>🚪 DOCK LIVE BOARD</h1>

<div class="container" id="board"></div>

<script>
let data = JSON.parse(localStorage.getItem("loads")) || [];

function render() {
  let container = document.getElementById("board");
  container.innerHTML = "";

  for (let d = 1; d <= 10; d++) {
    let doorDiv = document.createElement("div");
    doorDiv.className = "door";
    doorDiv.innerHTML = `<h2>DOOR ${d}</h2>`;

    let loads = data.filter(x => x.door == d);

    loads.forEach(load => {
      let div = document.createElement("div");
      div.className = "load";

      let now = new Date();
      let loadTime = new Date();
      let [h,m] = load.time.split(":");
      loadTime.setHours(h,m);

      let diff = (loadTime - now)/60000;

      if(load.status==="Completed") div.classList.add("complete");
      else if(diff < 0) div.classList.add("late");
      else if(diff <= 60) div.classList.add("upcoming");

      div.innerHTML = `
        <input value="${load.time}">
        ${load.carrier}<br>
        ${load.customer}<br>
        Trailer: ${load.trailer || "MISSING"}
        <br>Status: ${load.status}
      `;
      doorDiv.appendChild(div);
    });

    container.appendChild(doorDiv);
  }
}

function addLoad() {
  data.push({
    door: 1,
    time: "14:00",
    carrier: "K&B",
    customer: "HORMEL",
    trailer: "",
    status: "Today"
  });
  localStorage.setItem("loads", JSON.stringify(data));
  render();
}

render();
setInterval(render, 5000);
</script>

<button onclick="addLoad()">Add Load</button>

</body>
</html>
