<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrated Load Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  /* DARK MODE DEFAULT */
  --bg: #090c12;
  --surface: #0e1420;
  --surface2: #131a27;
  --border: #1e2d45;
  --border-bright: #2a4060;
  --accent: #00c8ff;
  --accent2: #0085b3;
  --text: #c8dff0;
  --text-dim: #5a7a99;
  --text-bright: #eaf4ff;

  --late: #ff3b3b;
  --late-bg: rgba(255,59,59,0.12);

  --upcoming: #f5c518;
  --upcoming-bg: rgba(245,197,24,0.10);

  --complete: #22e07a;
  --complete-bg: rgba(34,224,122,0.10);

  --high: #ff7030;
  --high-bg: rgba(255,112,48,0.12);

  --on-time: #00c8ff;
  --on-time-bg: rgba(0,200,255,0.08);

  --pkg: #8855ff;
  --pkg-bg: rgba(136,85,255,0.10);

  --grid-line: rgba(0,200,255,0.06);
  --glow: 0 0 20px rgba(0,200,255,0.18);
}

/* LIGHT MODE */
body.light-mode {
  --bg: #f4f7fb;
  --surface: #ffffff;
  --surface2: #eef3f9;

  --border: #cdd9e5;
  --border-bright: #9eb6cf;

  --accent: #0077cc;
  --accent2: #005fa3;

  --text: #1f2d3d;
  --text-dim: #60758a;
  --text-bright: #000000;

  --late-bg: rgba(255,59,59,0.08);
  --upcoming-bg: rgba(245,197,24,0.08);
  --complete-bg: rgba(34,224,122,0.08);
  --high-bg: rgba(255,112,48,0.08);
  --on-time-bg: rgba(0,119,204,0.06);

  --pkg-bg: rgba(136,85,255,0.06);

  --grid-line: rgba(0,0,0,0.04);

  --glow: 0 0 12px rgba(0,119,204,0.15);
}

/* BASE */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .25s ease, color .25s ease;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
                    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ====== KEEP ORIGINAL CSS BELOW (UNCHANGED) ====== */
/* (All existing styles remain exactly the same) */

/* Only example patch shown for transitions */
tbody td {
  transition: background .12s, color .25s, border-color .25s;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M3 3h18v4H3zm0 6h18v4H3zm0 6h18v4H3z"/></svg>
    </div>
    <div class="logo-text"> MGR — <span>Integrated Load System</span></div>
  </div>

  <div class="header-right">

    <!-- THEME TOGGLE ADDED -->
    <button class="btn btn-ghost" id="theme-toggle" onclick="toggleTheme()">
      🌙 Dark
    </button>

    <div id="clock"></div>

    <div class="status-badge">
      <div class="status-dot"></div>
      System Live
    </div>
  </div>
</header>

<!-- ===== YHE ENTIRE ORIGINAL HTML REMAINS UNCHANGED ===== -->

<!-- (tabs, panels, modals, tables, etc. all untouched) -->

<script>
// =========================
// THEME SYSTEM (NEW)
// =========================
const THEME_KEY = 'MGR_THEME';

function applyTheme(theme) {
  const body = document.body;
  const btn = document.getElementById('theme-toggle');

  if (theme === 'light') {
    body.classList.add('light-mode');
    if (btn) btn.innerHTML = '☀️ Light';
  } else {
    body.classList.remove('light-mode');
    if (btn) btn.innerHTML = '🌙 Dark';
  }

  localStorage.setItem(THEME_KEY, theme);
}

function toggleTheme() {
  const isLight = document.body.classList.contains('light-mode');
  applyTheme(isLight ? 'dark' : 'light');
}

function loadTheme() {
  const saved = localStorage.getItem(THEME_KEY);

  if (saved) {
    applyTheme(saved);
    return;
  }

  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  applyTheme(prefersLight ? 'light' : 'dark');
}

// =========================
// ORIGINAL APP CODE
// =========================
const STORE_KEY = 'MGR_LOADS_v3';
let loads = [];
let editingId = null;
let ctxTargetId = null;
let sortField = 'gateTime';
let sortDir = 1;
let importRows = [];
let skipSet = new Set();

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { loads = JSON.parse(raw); return; }
  } catch(e) {}
  loads = [];
}

function saveData() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(loads)); } catch(e) {}
  render();
}

// ===== EVERYTHING ELSE IN THE ORIGINAL SCRIPT REMAINS EXACTLY THE SAME =====
// (NO LOGIC CHANGES OTHER THAN INIT BELOW)

function init() {
  loadTheme();   // <-- NEW (theme loads first)
  loadData();
  render();
  tick();
  setInterval(tick, 1000);
  setInterval(render, 60000);
}

init();
</script>

</body>
</html>
